<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nippard Ref">
<title>Nippard Reference Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&family=Barlow+Condensed:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0f0f0;
  --text2:#999;
  --text3:#555;
  --accent:#d4ff4f;
  --accent-dim:#a8cc3a;
  --red:#ff5a5a;
  --blue:#5ab4ff;
  --amber:#ffb83f;
  --purple:#b09fff;
  --green:#4fffb0;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f5f5f3;
    --surface:#ffffff;
    --surface2:#f0f0ee;
    --border:#e0e0dc;
    --border2:#d0d0cc;
    --text:#111111;
    --text2:#666666;
    --text3:#aaaaaa;
    --accent:#3a7d00;
    --accent-dim:#2e6400;
    --red:#cc2222;
    --blue:#1a6bbf;
    --amber:#b85e00;
    --purple:#6b4db5;
    --green:#1a7a50;
  }
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 0 12px;
  backdrop-filter:blur(10px);
}
.header-wordmark{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
}
.header-eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:400;letter-spacing:3.5px;
  color:var(--text3);text-transform:uppercase;
  margin-bottom:5px;
}
.header-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:34px;font-weight:800;letter-spacing:-0.5px;
  color:var(--text);line-height:1;text-transform:uppercase;
  display:flex;align-items:baseline;gap:10px;
}
.header-name-light{
  font-weight:300;color:var(--text2);
}
.header-rule-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;
}
.header-rule{
  height:2px;width:32px;background:var(--text);border-radius:1px;
}
.header-meta{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--text3);letter-spacing:0.3px;
}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all 0.15s;
  font-family:'DM Mono',monospace;
}
.filter-chip.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent)}

/* ── SEARCH ── */
.search-wrap{
  margin:12px 20px 0;
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  padding:11px 14px;
}
.search-wrap svg{flex-shrink:0;opacity:0.4}
.search-wrap input{
  border:none;outline:none;background:transparent;
  font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;width:100%;
}
.search-wrap input::placeholder{color:var(--text3)}

/* ── TIER ROW ── */
.tier-row{display:flex;gap:8px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none}
.tier-row::-webkit-scrollbar{display:none}
.tier-btn{
  flex-shrink:0;font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:20px;border:1px solid transparent;
  cursor:pointer;transition:all 0.15s;font-family:'DM Mono',monospace;
}
.tier-btn.all{border-color:var(--border2);color:var(--text2);background:var(--surface)}
.tier-btn.all.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.tier-btn.sp{background:rgba(212,255,79,0.12);color:var(--accent);border-color:rgba(212,255,79,0.3)}
.tier-btn.sp.active{background:var(--accent);color:#0f0f0f}
.tier-btn.s{background:rgba(90,180,255,0.1);color:var(--blue);border-color:rgba(90,180,255,0.3)}
.tier-btn.s.active{background:var(--blue);color:#0f0f0f}
.tier-btn.a{background:rgba(255,184,63,0.1);color:var(--amber);border-color:rgba(255,184,63,0.3)}
.tier-btn.a.active{background:var(--amber);color:#0f0f0f}
.tier-btn.b{background:rgba(176,159,255,0.1);color:var(--purple);border-color:rgba(176,159,255,0.3)}
.tier-btn.b.active{background:var(--purple);color:#0f0f0f}

/* ── GRID ── */
.grid-wrap{padding:12px 20px 140px}
.result-label{font-size:11px;color:var(--text3);margin-bottom:10px;font-family:'DM Mono',monospace;letter-spacing:0.3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:500px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;
  display:flex;flex-direction:column;gap:9px;
  -webkit-user-select:none;user-select:none;
}
.card:active{transform:scale(0.97)}
.card.selected{border-color:var(--accent)}
.card-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--text)}
.card-badges{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:0.2px}
.badge-sp{background:rgba(212,255,79,0.15);color:var(--accent)}
.badge-s{background:rgba(90,180,255,0.12);color:var(--blue)}
.badge-a{background:rgba(255,184,63,0.12);color:var(--amber)}
.badge-b{background:rgba(176,159,255,0.12);color:var(--purple)}
.badge-fav{background:rgba(255,90,90,0.12);color:var(--red)}
.card-equip{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.dot{width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0}

/* ── DRAWER ── */
.drawer-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(5px);
}
.drawer-overlay.open{display:block}
.drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:var(--surface);border-radius:22px 22px 0 0;
  border-top:1px solid var(--border2);
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0}
.drawer-inner{padding:20px 20px 48px}

.drawer-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.drawer-name{font-size:20px;font-weight:700;line-height:1.2;color:var(--text)}
.drawer-close{
  flex-shrink:0;width:30px;height:30px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);font-size:15px;
}

.drawer-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.drawer-group-badge{
  font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;
  background:var(--surface2);color:var(--text2);border:1px solid var(--border2);
  font-family:'DM Mono',monospace;
}

/* ── MUSCLE VISUAL ── */
.muscle-visual{
  margin-bottom:20px;
  background:var(--surface2);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;
}
.muscle-visual-header{
  padding:12px 16px 10px;
  font-size:11px;font-weight:700;color:var(--text3);
  font-family:'DM Mono',monospace;letter-spacing:0.5px;
  text-transform:uppercase;border-bottom:1px solid var(--border);
}
.muscle-group-row{
  display:flex;align-items:center;gap:0;
}
.muscle-side-label{
  width:52px;flex-shrink:0;
  font-size:10px;font-weight:700;color:var(--text3);
  font-family:'DM Mono',monospace;letter-spacing:0.4px;
  text-transform:uppercase;
  padding:0 10px 0 16px;
  text-align:right;
  line-height:1.2;
}
.muscle-bars{
  flex:1;display:flex;flex-direction:column;gap:5px;
  padding:12px 16px 12px 8px;
  border-left:1px solid var(--border);
}
.muscle-bar-item{display:flex;align-items:center;gap:8px}
.muscle-bar-label{font-size:12px;color:var(--text);font-weight:500;flex:0 0 auto;min-width:0}
.muscle-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.muscle-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.muscle-bar-fill.primary{background:var(--accent)}
.muscle-bar-fill.secondary{background:rgba(212,255,79,0.35)}
.no-muscles{
  padding:20px 16px;text-align:center;
  font-size:13px;color:var(--text3);font-style:italic;
}

/* ── SECTION LABEL ── */
.section-label{
  font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;
  margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;
}

/* ── ACTIONS ── */
.actions{display:flex;flex-direction:column;gap:10px;margin-top:4px}

/* Hero YouTube button */
.btn-yt-hero{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;border-radius:14px;
  background:#ff0000;border:none;cursor:pointer;
  transition:all 0.15s;text-decoration:none;
  border:2px solid rgba(255,255,255,0.12);
}
.btn-yt-hero:active{transform:scale(0.97);background:#cc0000}
.btn-yt-hero-icon{
  width:44px;height:44px;border-radius:10px;
  background:rgba(0,0,0,0.25);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.btn-yt-hero-text{display:flex;flex-direction:column;gap:2px;text-align:left}
.btn-yt-hero-label{font-size:11px;color:rgba(255,255,255,0.7);font-family:'DM Mono',monospace;font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
.btn-yt-hero-cta{font-size:16px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif}
.btn-yt-hero-arrow{margin-left:auto;color:rgba(255,255,255,0.6);flex-shrink:0}
.no-video-box{
  padding:16px 20px;border-radius:14px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;color:var(--text3);font-size:14px;
}

/* Add to workout button */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;
  padding:13px 20px;border-radius:12px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);cursor:pointer;
  transition:all 0.15s;width:100%;
}
.btn:active{transform:scale(0.97)}
.btn-add{background:var(--accent);color:#0f0f0f;border-color:var(--accent)}
.btn-add:active{background:var(--accent-dim)}
.btn-added{background:var(--surface2);color:var(--text3);border-color:var(--border);cursor:default}

/* ── FAB ── */
.workout-fab{
  position:fixed;bottom:28px;right:20px;z-index:150;
  background:var(--accent);color:#0f0f0f;
  border-radius:30px;padding:13px 20px;
  display:flex;align-items:center;gap:9px;
  font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 24px rgba(212,255,79,0.35);
  transition:transform 0.15s;border:none;
}
.workout-fab:active{transform:scale(0.96)}
.workout-fab .count-badge{
  background:#0f0f0f;color:var(--accent);
  border-radius:20px;padding:2px 9px;font-size:12px;
  font-family:'DM Mono',monospace;font-weight:700;
}

/* ── WORKOUT PANEL ── */
.workout-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--surface);border-radius:22px 22px 0 0;
  border-top:1px solid var(--border2);
  max-height:82vh;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  display:flex;flex-direction:column;
}
.workout-panel.open{transform:translateY(0)}
.workout-panel-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.workout-panel-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border);
}
.workout-panel-title{font-size:17px;font-weight:700}
.btn-clear-all{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 0}
.workout-scroll{overflow-y:auto;padding:8px 20px 48px;flex:1}
.workout-empty{color:var(--text3);font-size:14px;text-align:center;padding:36px 20px;line-height:1.7}
.workout-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 0;border-bottom:1px solid var(--border);
}
.workout-item:last-child{border-bottom:none}
.workout-item-info{flex:1;min-width:0}
.workout-item-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.workout-item-group{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px}
.workout-item-actions{display:flex;gap:7px;flex-shrink:0}
.icon-btn{
  width:32px;height:32px;border-radius:9px;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);
}
/* ── TIER LEGEND (drawer inline) ── */
.drawer-tier-explainer{
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:16px;
}
.drawer-tier-explainer-label{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);
  letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;
}
.drawer-tier-explainer-row{display:flex;align-items:baseline;gap:10px}
.drawer-tier-explainer-pill{
  flex-shrink:0;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;
}
.drawer-tier-explainer-text{font-size:13px;color:var(--text2);line-height:1.4}
.drawer-tier-explainer-text strong{color:var(--text);font-weight:600}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 0 8px;cursor:pointer;
  background:none;border:none;color:var(--text3);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.3px;
  transition:color 0.15s;
}
.nav-tab.active{color:var(--text)}
.nav-tab svg{width:22px;height:22px}

/* ── PAGE VIEWS ── */
.page{display:none}
.page.active{display:block}

/* ── MY LIFTS ── */
.lifts-header{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:100;
}
.lifts-eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:400;letter-spacing:3.5px;
  color:var(--text3);text-transform:uppercase;margin-bottom:5px;
}
.lifts-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:34px;font-weight:800;letter-spacing:-0.5px;
  color:var(--text);line-height:1;text-transform:uppercase;
  display:flex;align-items:baseline;gap:10px;
}
.lifts-title span{font-weight:300;color:var(--text2)}
.lifts-rule-row{
  display:flex;align-items:center;justify-content:space-between;margin-top:10px;
}
.lifts-rule{height:2px;width:32px;background:var(--text);border-radius:1px}
.lifts-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.lifts-list{padding:12px 20px 140px}
.lift-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  margin-bottom:10px;overflow:hidden;
}
.lift-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;gap:12px;cursor:pointer;
}
.lift-card-left{flex:1;min-width:0}
.lift-card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px}
.lift-card-pr{
  font-family:'DM Mono',monospace;font-size:14px;
  color:var(--accent);font-weight:500;letter-spacing:0.2px;
}
.lift-card-chevron{color:var(--text3);flex-shrink:0;transition:transform 0.2s}
.lift-card.open .lift-card-chevron{transform:rotate(180deg)}
.lift-history{display:none;border-top:1px solid var(--border)}
.lift-card.open .lift-history{display:block}
.lift-history-empty{padding:14px 16px;font-size:13px;color:var(--text3);font-style:italic}
.lift-history-row{
  display:flex;align-items:baseline;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);
}
.lift-history-row:last-child{border-bottom:none}
.lift-history-date{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--text3);flex-shrink:0;min-width:58px;
}
.lift-history-note{font-size:13px;color:var(--text2);line-height:1.4;flex:1}
.lift-pr-badge{
  flex-shrink:0;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;
  color:var(--accent);letter-spacing:0.5px;
  background:rgba(212,255,79,0.1);padding:2px 7px;border-radius:20px;
}
@media(prefers-color-scheme:light){
  .lift-pr-badge{background:rgba(58,125,0,0.1)}
}

/* iPhone safe area padding for scrollable content */
html{padding-top:env(safe-area-inset-top)}
.grid-wrap, .lifts-list{padding-bottom:calc(120px + env(safe-area-inset-bottom))}
</style>
</head>
<body>

<!-- ── PAGE: BROWSE ── -->
<div class="page active" id="page-browse">
  <div class="header-wordmark">
    <div class="header-eyebrow">Jeff Nippard</div>
    <div class="header-name">Reference <span class="header-name-light">Manual</span></div>
    <div class="header-rule-row">
      <div class="header-rule"></div>
      <div class="header-meta" id="ex-count">154 exercises</div>
    </div>
  </div>
  <div class="filters" id="muscle-filters" style="padding:0 20px">
    <div class="filter-chip active" data-muscle="">All</div>
    <div class="filter-chip" data-muscle="Back">Back</div>
    <div class="filter-chip" data-muscle="Chest">Chest</div>
    <div class="filter-chip" data-muscle="Shoulder">Shoulder</div>
    <div class="filter-chip" data-muscle="Biceps">Biceps</div>
    <div class="filter-chip" data-muscle="Triceps">Triceps</div>
    <div class="filter-chip" data-muscle="Quad">Quad</div>
    <div class="filter-chip" data-muscle="Glute">Glute</div>
    <div class="filter-chip" data-muscle="Hamstring">Hamstring</div>
    <div class="filter-chip" data-muscle="Adductors">Adductors</div>
    <div class="filter-chip" data-muscle="Calves">Calves</div>
    <div class="filter-chip" data-muscle="Core">Core</div>
    <div class="filter-chip" data-muscle="Forarm">Forearm</div>
    <div class="filter-chip" data-muscle="Neck">Neck</div>
  </div>
</div>

<div class="search-wrap">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" id="search" placeholder="Search exercises..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="tier-row">
  <button class="tier-btn all active" data-tier="">All tiers</button>
  <button class="tier-btn sp" data-tier="5 - S+">S+</button>

function buildMuscleVisual(muscles) {
  if (!muscles || muscles.length === 0) {
    return `<div class="muscle-visual">
      <div class="muscle-visual-header">MUSCLES TARGETED</div>
      <div class="no-muscles">No muscle data available</div>
    </div>`;
  }

  // Group muscles, track which are primary (first-mentioned per group)
  const groupMap = {};
  muscles.forEach(m => {
    const info = MUSCLE_GROUPS[m];
    if (!info) return;
    if (!groupMap[info.group]) groupMap[info.group] = {color: info.color, muscles: [], primary: true};
    groupMap[info.group].muscles.push(m.split(': ')[1] || m);
  });

  const groups = Object.entries(groupMap);
  const maxGroups = groups.length;

  // Primary group is the first one — gets full bar
  // Others get proportionally smaller bars to indicate secondary
  const rows = groups.map(([groupName, data], i) => {
    const isPrimary = i === 0;
    const barPct = isPrimary ? 100 : Math.max(40, 80 - i * 15);
    const subLabel = data.muscles.slice(0, 3).join(', ');
    return `<div class="muscle-bar-item">
      <div style="display:flex;flex-direction:column;flex:0 0 110px;min-width:0;padding-right:10px">
        <span style="font-size:13px;font-weight:${isPrimary?700:500};color:${isPrimary?'var(--text)':'var(--text2)'}">${groupName}</span>
        ${subLabel ? `<span style="font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${subLabel}</span>` : ''}
      </div>
      <div class="muscle-bar-track">
        <div class="muscle-bar-fill ${isPrimary?'primary':''}" style="width:${barPct}%;background:${isPrimary ? data.color : data.color+'55'}"></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="muscle-visual">
    <div class="muscle-visual-header">MUSCLES TARGETED</div>
    <div class="muscle-bars" style="padding:14px 16px 14px 16px">${rows}</div>
  </div>`;
}

let filterMuscle='', filterTier='', filterSearch='', activeEx=null;
const workout=[];

function tierBadge(t){
  if(t==='5 - S+') return `<span class="badge badge-sp">S+</span>`;
  if(t==='4 - S') return `<span class="badge badge-s">S</span>`;
  if(t==='3 - A') return `<span class="badge badge-a">A</span>`;
  if(t==='2 - B') return `<span class="badge badge-b">B</span>`;
  return '';
}

function render(){
  const filtered=EXERCISES.filter(e=>{
    if(filterMuscle && e.primaryGroup!==filterMuscle) return false;
    if(filterTier && e.tierGrade!==filterTier) return false;
    if(filterSearch && !e.name.toLowerCase().includes(filterSearch)) return false;
    return true;
  });
  document.getElementById('result-label').textContent=filtered.length+' exercises';
  document.getElementById('ex-count').textContent=filtered.length+' shown';
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  filtered.forEach(ex=>{
    const d=document.createElement('div');
    d.className='card'+(activeEx===ex.name?' selected':'');
    d.innerHTML=`<div class="card-name">${ex.name}</div>
      <div class="card-badges">${tierBadge(ex.tierGrade)}${ex.jeffFav?'<span class="badge badge-fav">★ fav</span>':''}</div>
      <div class="card-equip"><div class="dot"></div>${ex.equipment}</div>`;
    d.addEventListener('click',()=>openDetail(ex));
    grid.appendChild(d);
  });
}

function openDetail(ex){
  activeEx=ex.name;
  render();
  const inW=workout.some(w=>w.name===ex.name);
  document.getElementById('d-name').textContent=ex.name;

  let badges=`<span class="drawer-group-badge">${ex.primaryGroup}</span>`;
  if(ex.tierGrade) badges+=tierBadge(ex.tierGrade).replace(/class="badge /g,'class="badge ').replace(/font-size:10px/g,'font-size:12px').replace(/padding:2px 7px/g,'padding:5px 12px');
  if(ex.jeffFav) badges+=`<span class="badge badge-fav" style="font-size:12px;padding:5px 12px">★ Jeff's fav</span>`;
  if(ex.muscleLadder) badges+=`<span class="badge badge-b" style="font-size:12px;padding:5px 12px">Muscle Ladder</span>`;
  document.getElementById('d-badges').innerHTML=badges;

  // Tier explainer — only shown when exercise has a tier rating
  const tierExplainer = document.getElementById('d-tier-legend');
  const TIER_INFO = {
    '5 - S+': {cls:'sp', style:'background:rgba(212,255,79,0.15);color:var(--accent)', label:'S+', title:'Elite — Jeff\'s top pick', desc:'Best biomechanics, highest activation, fewest trade-offs. These are the exercises Jeff builds programs around first.'},
    '4 - S':  {cls:'s',  style:'background:rgba(90,180,255,0.12);color:var(--blue)',   label:'S',  title:'Excellent', desc:'Very strong stimulus-to-fatigue ratio. Minor limitations vs S+ but still highly recommended.'},

    '2 - B':  {cls:'b',  style:'background:rgba(176,159,255,0.12);color:var(--purple)',label:'B',  title:'Decent — use with intent', desc:'Works fine but outclassed by higher-tier options. Best for variety or when better alternatives aren\'t available.'},
  };
  if(ex.tierGrade && TIER_INFO[ex.tierGrade]){
    const t = TIER_INFO[ex.tierGrade];
    tierExplainer.innerHTML=`<div class="drawer-tier-explainer">
      <div class="drawer-tier-explainer-label">What this tier means</div>
      <div class="drawer-tier-explainer-row">
        <span class="drawer-tier-explainer-pill" style="${t.style}">${t.label}</span>
        <span class="drawer-tier-explainer-text"><strong>${t.title}</strong> ${t.desc}</span>
      </div>

  } else {
    tierExplainer.innerHTML='';
  }

  document.getElementById('d-muscle-visual').innerHTML=buildMuscleVisual(ex.muscles);

  const aEl=document.getElementById('d-actions');
  // Hero YouTube button first
  let acts = ex.link
    ? `<a class="btn-yt-hero" href="${ex.link}" target="_blank">
        <div class="btn-yt-hero-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
        </div>
        <div class="btn-yt-hero-text">
          <span class="btn-yt-hero-label">Jeff Nippard · Watch demo</span>
          <span class="btn-yt-hero-cta">Open video tutorial →</span>
        </div>
      </a>`
    : `<div class="no-video-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="m8 6-2-4M16 6l2-4"/></svg>
        No demo video available for this exercise
      </div>`;

  // Add to workout button below
  acts += inW
    ? `<button class="btn btn-added" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
        Added to today's workout
       </button>`
    : `<button class="btn btn-add" onclick="addToWorkout('${ex.name.replace(/'/g,"\\'")}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add to today's workout
       </button>`;
  aEl.innerHTML=acts;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function addToWorkout(name){
  const ex=EXERCISES.find(e=>e.name===name);
  if(!ex||workout.some(w=>w.name===name)) return;
  workout.push(ex);
  renderWorkout();
  if(activeEx===name) openDetail(ex);
}

function removeWorkout(i){
  workout.splice(i,1);
  renderWorkout();
  if(activeEx){const ex=EXERCISES.find(e=>e.name===activeEx);if(ex) openDetail(ex);}
}

function renderWorkout(){
  document.getElementById('fab-count').textContent=workout.length;
  const list=document.getElementById('workout-list');
  if(!workout.length){
    list.innerHTML='<div class="workout-empty">No exercises yet.<br>Browse and tap "Add to today" to build your session.</div>';
    return;
  }
  list.innerHTML=workout.map((ex,i)=>`
    <div class="workout-item">
      <div class="workout-item-info">
        <div class="workout-item-name">${ex.name}</div>
        <div class="workout-item-group">${ex.primaryGroup} · ${ex.equipment}</div>
      </div>
      <div class="workout-item-actions">
        ${ex.link?`<a class="icon-btn" href="${ex.link}" target="_blank" title="Watch demo">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
        </a>`:''}
        <div class="icon-btn remove" onclick="removeWorkout(${i})" title="Remove">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
    </div>`).join('');
}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  activeEx=null;render();
}

document.getElementById('overlay').addEventListener('click',closeDrawer);
document.getElementById('d-close').addEventListener('click',closeDrawer);

document.getElementById('muscle-filters').addEventListener('click',e=>{
  const chip=e.target.closest('.filter-chip');
  if(!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  filterMuscle=chip.dataset.muscle;
  render();
});

function renderLifts(){
  const list = document.getElementById('lifts-list');
  list.innerHTML = LIFTS.map((lift,i) => {
    const historyHTML = lift.history.length
      ? lift.history.map(h=>`
          <div class="lift-history-row">
            <span class="lift-history-date">${h.date}</span>
            <span class="lift-history-note">${h.note}</span>
            ${h.pr ? '<span class="lift-pr-badge">PR</span>' : ''}
          </div>`).join('')
      : '<div class="lift-history-empty">No history logged yet</div>';
    return `<div class="lift-card" id="lift-${i}">
      <div class="lift-card-header" onclick="toggleLift(${i})">
        <div class="lift-card-left">
          <div class="lift-card-name">${lift.name}</div>
          <div class="lift-card-pr">${lift.current}</div>
        </div>
        <svg class="lift-card-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      <div class="lift-history">${historyHTML}</div>
    </div>`;
  }).join('');
}

function toggleLift(i){
  document.getElementById('lift-'+i).classList.toggle('open');
}

function switchTab(tab){
  document.getElementById('page-browse').classList.toggle('active', tab==='browse');
  document.getElementById('page-lifts').classList.toggle('active', tab==='lifts');
  document.getElementById('tab-browse').classList.toggle('active', tab==='browse');
  document.getElementById('tab-lifts').classList.toggle('active', tab==='lifts');
  // hide FAB on lifts tab
  document.getElementById('workout-fab').style.display = tab==='browse' ? '' : 'none';
}
